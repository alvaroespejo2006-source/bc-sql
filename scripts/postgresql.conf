# postgresql.conf — Configuración personalizada para bc-sql Bootcamp
# PostgreSQL 16 / Alpine Linux
# ──────────────────────────────────────────────────────────────────
# Solo se sobreescriben los parámetros relevantes para el bootcamp.
# El resto usa los valores por defecto de PostgreSQL 16.
# ──────────────────────────────────────────────────────────────────

# ── Conexiones ────────────────────────────────────────────────────
listen_addresses = '*'          # acepta conexiones desde el host (via Docker)
port             = 5432
max_connections  = 50           # suficiente para un entorno de aprendizaje

# ── Rendimiento (ajustado para contenedor con poca RAM) ───────────
shared_buffers            = 128MB
work_mem                  = 4MB
maintenance_work_memory   = 64MB
effective_cache_size      = 256MB

# ── WAL y checkpoints ─────────────────────────────────────────────
wal_level            = replica
max_wal_size         = 1GB
min_wal_size         = 80MB
checkpoint_completion_target = 0.9

# ── Logging para el bootcamp ──────────────────────────────────────
# Muestra las queries lentas (útil en semana 23 — EXPLAIN ANALYZE)
log_min_duration_statement = 1000   # loggear queries > 1 segundo
log_line_prefix            = '%t [%p] %u@%d '
log_timezone               = 'UTC'
logging_collector          = off    # logs van a stdout del contenedor

# ── Estadísticas (necesario para pg_stat_statements) ─────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max   = 1000
pg_stat_statements.track = all

# ── Locale y encoding ─────────────────────────────────────────────
datestyle       = 'iso, mdy'
timezone        = 'UTC'
lc_messages     = 'en_US.UTF-8'
lc_monetary     = 'en_US.UTF-8'
lc_numeric      = 'en_US.UTF-8'
lc_time         = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'
