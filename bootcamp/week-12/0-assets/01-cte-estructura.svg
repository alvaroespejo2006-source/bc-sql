<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <rect width="760" height="420" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="380" y="36" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Estructura de un CTE (WITH)</text>

  <!-- WITH block -->
  <rect x="40" y="60" width="680" height="160" rx="10" fill="#16213e" stroke="#336791" stroke-width="2"/>
  <text x="60" y="86" font-family="monospace" font-size="13" fill="#c678dd">WITH</text>
  <text x="100" y="86" font-family="monospace" font-size="13" fill="#f6c90e">nombre_cte</text>
  <text x="215" y="86" font-family="monospace" font-size="13" fill="#e2e8f0">AS (</text>

  <!-- Inner query box -->
  <rect x="80" y="100" width="560" height="108" rx="6" fill="#0d1117" stroke="#56b6c2" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="122" font-family="monospace" font-size="12" fill="#c678dd">SELECT</text>
  <text x="172" y="122" font-family="monospace" font-size="12" fill="#e2e8f0">employee_id, first_name, salary</text>
  <text x="110" y="142" font-family="monospace" font-size="12" fill="#c678dd">FROM</text>
  <text x="155" y="142" font-family="monospace" font-size="12" fill="#e06c75">employees</text>
  <text x="110" y="162" font-family="monospace" font-size="12" fill="#c678dd">WHERE</text>
  <text x="162" y="162" font-family="monospace" font-size="12" fill="#e2e8f0">is_active =</text>
  <text x="258" y="162" font-family="monospace" font-size="12" fill="#98c379">1</text>
  <text x="100" y="197" font-family="monospace" font-size="13" fill="#e2e8f0">)</text>

  <!-- Label: consulta interna -->
  <text x="630" y="140" font-family="Inter, sans-serif" font-size="11" fill="#56b6c2" text-anchor="middle">consulta</text>
  <text x="630" y="156" font-family="Inter, sans-serif" font-size="11" fill="#56b6c2" text-anchor="middle">interna</text>

  <!-- Arrow down -->
  <line x1="380" y1="230" x2="380" y2="262" stroke="#718096" stroke-width="2"/>
  <polygon points="380,270 374,258 386,258" fill="#718096"/>

  <!-- Main query box -->
  <rect x="40" y="272" width="680" height="112" rx="10" fill="#16213e" stroke="#98c379" stroke-width="2"/>
  <text x="60" y="300" font-family="monospace" font-size="13" fill="#c678dd">SELECT</text>
  <text x="118" y="300" font-family="monospace" font-size="13" fill="#e2e8f0">n.first_name, n.salary</text>
  <text x="60" y="322" font-family="monospace" font-size="13" fill="#c678dd">FROM</text>
  <text x="104" y="322" font-family="monospace" font-size="13" fill="#f6c90e">nombre_cte</text>
  <text x="215" y="322" font-family="monospace" font-size="13" fill="#e2e8f0">AS n</text>
  <text x="60" y="344" font-family="monospace" font-size="13" fill="#c678dd">WHERE</text>
  <text x="116" y="344" font-family="monospace" font-size="13" fill="#e2e8f0">n.salary &gt; 50000</text>
  <text x="60" y="366" font-family="monospace" font-size="13" fill="#c678dd">ORDER BY</text>
  <text x="144" y="366" font-family="monospace" font-size="13" fill="#e2e8f0">n.salary DESC;</text>

  <!-- Labels -->
  <text x="380" y="408" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">El CTE se usa como una tabla normal en la consulta principal</text>
</svg>
